<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a senha</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 10px; width: min(95%, 420px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .card img.login-logo { width: 140px; height: auto; display: block; margin: 0 auto 20px; }
        h2 { margin-top: 0; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; background: #f0f8ff; border: 1px solid #9fd0ff; }
        .msg.success { background: #eaf7ea; border-color: #8ed48e; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 11px; border: none; border-radius: 6px; background: #3498db; color: white; cursor: pointer; font-size: 1rem; }
        a { display: inline-block; margin-top: 12px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='logo_hd.png') }}" alt="Xerifado" class="login-logo">
        <h2>Esqueci a senha</h2>
        {% if mensagem %}
            <div class="msg {% if sucesso %}success{% endif %}">{{ mensagem }}</div>
        {% endif %}
        {% if etapa == 'codigo' %}
            <form method="POST" action="{{ url_for('esqueci_senha') }}">
                <input type="hidden" name="email" value="{{ email }}">
                <div class="form-group">
                    <label for="codigo">Código recebido por SMS</label>
                    <input type="text" id="codigo" name="codigo" required>
                </div>
                <div class="form-group">
                    <label for="senha">Nova senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>
                <button type="submit">Redefinir senha</button>
            </form>
        {% else %}
            <form method="POST" action="{{ url_for('esqueci_senha') }}">
                <div class="form-group">
                    <label for="email">E-mail cadastrado</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit">Enviar código</button>
            </form>
        {% endif %}
        <a href="{{ url_for('login') }}">Voltar para o login</a>
    </div>
</body>
</html>
